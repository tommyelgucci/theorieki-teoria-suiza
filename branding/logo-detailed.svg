<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="rojo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EF4050"/>
      <stop offset="0.55" stop-color="#D7263D"/>
      <stop offset="1" stop-color="#B3121F"/>
    </linearGradient>
    <filter id="sombra" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#5A0A12" flood-opacity="0.35"/>
    </filter>
    <filter id="sombraSuave" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#5A0A12" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Fondo del ícono -->
  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#rojo)"/>

  <!-- Cara robot -->
  <g filter="url(#sombraSuave)">
    <rect x="234" y="196" width="556" height="168" rx="84" fill="#F8F5F1"/>
  </g>
  <circle cx="340" cy="280" r="33" fill="#F4B942"/>
  <circle cx="684" cy="280" r="33" fill="#2F9E44"/>
  <path d="M470 264 Q512 306 554 264" fill="none" stroke="#1F1A17" stroke-width="15" stroke-linecap="round"/>

  <!-- Línea de progreso: termina EN la licencia -->
  <polyline points="252,838 384,652 472,744 696,436"
            fill="none" stroke="#FFFFFF" stroke-width="54"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Licencia de conducir (meta) -->
  <g transform="translate(704,428) rotate(8)" filter="url(#sombra)">
    <rect x="-142" y="-96" width="284" height="192" rx="30" fill="#FFFFFF"/>
    <!-- foto -->
    <rect x="-114" y="-56" width="82" height="82" rx="14" fill="#D7263D"/>
    <!-- líneas de texto -->
    <rect x="-12" y="-52" width="122" height="17" rx="8.5" fill="#D7263D"/>
    <rect x="-12" y="-20" width="100" height="17" rx="8.5" fill="#D7263D"/>
    <rect x="-12" y="12" width="78" height="17" rx="8.5" fill="#D7263D"/>
    <!-- badge L de aprendiz (azul suizo) -->
    <rect x="72" y="40" width="52" height="52" rx="12" fill="#1B6FD8"/>
    <path d="M90 52 v30 h22" fill="none" stroke="#FFFFFF" stroke-width="10"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
